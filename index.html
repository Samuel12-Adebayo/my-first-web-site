<!DOCTYPE html>
<html>
<head>
<title>My First Website</title>

<style>
body{
font-family: Arial;
text-align:center;
background: linear-gradient(to right, #4facfe, #00f2fe);
padding:50px;
color:white;
}

header{
margin-bottom:40px;
}

.logo-container{
margin-bottom:30px;
}

.logo-container img{
max-width:200px;
height:auto;
border-radius:15px;
box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.slogan{
font-size:28px;
font-weight:bold;
margin:20px 0;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:10px;
border-left:5px solid white;
line-height:1.6;
text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

h1{
font-size:40px;
}

button{
padding:15px 30px;
font-size:20px;
background:white;
color:#333;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#f1f1f1;
}

#fact{
margin-top:30px;
font-size:24px;
background:rgba(0,0,0,0.2);
padding:20px;
border-radius:10px;
display:inline-block;
}
</style>

</head>

<body>

<header>
<div class="logo-container">
<img src="logo.png" alt="Your 3D Logo">
</div>
<p class="slogan">THE FEAR OF GOD IS THE BEGINNING OF SUCCESS</p>
</header>

<h1>Random Fun Facts 🌍</h1>

<p>Click the button to discover an amazing fact!</p>

<button onclick="showFact()">Show Fun Fact</button>

<p id="fact"></p>

<script>

const facts = [
"Honey never spoils 🍯",
"Octopuses have three hearts ❤️",
"Bananas are technically berries 🍌",
"The human brain is 73% water 💧",
"Sharks existed before trees 🦈"
];

function showFact(){
let random = Math.floor(Math.random()*facts.length);
document.getElementById("fact").innerText = facts[random];
}

</script>

</body>
</html>
